app_name: biz-opportunity-finder

# ═══════════════════════════════════════════════════════════════
# 设计约定（架构级注释块，供审阅者审查与运行引擎参照）
# ═══════════════════════════════════════════════════════════════
#
# 版本: v2 — AI 副业探索器
# 设计目标: 帮助学术背景用户（准直博三年级学生）探索如何将 AI 编排
#           引擎能力转化为可变现的副业，聚焦副业定位（兼职可执行、
#           低启动成本、快速验证）。通过多角色协作完成市场情报→机会
#           识别→对抗质疑→策略建议→综合报告的全链路分析，最终产出
#           结构化、可执行的 AI 副业探索报告。
#
# §1  编排总览（四层 × 角色映射）
#     L1 需求理解层 → 需求接收者(producer, manual) + 需求接收者（校验）
#     L2 情报搜集层 → 市场情报搜集者
#     L3 机会分析层 → 机会分析师 + 机会红队（对抗迭代，max 3 轮）
#     L4 策略与报告层 → 策略建议者 + 综合报告者
#
# §2  循环回路与迭代控制
#     a) 需求校验回路 —— 需求接收者（校验）loop → 需求接收者
#        局部回退，设 max_executions: 10（防御性上限，格式修正类回路远不需此数）
#        【D1 修复】原使用系统保留词 'fail' 作为自定义 verdict，
#        SDK_SPEC §3.4 会对显式 fail 边施加默认 max_executions=3。
#        已改为自定义 verdict 'loop'，自定义 verdict 边不获得 SDK 默认 max_executions。
#        【R5 修复】原设计「不设上限」，但综合裁决指出极端条件下可导致工作流
#        永久挂死（无降级出口）。已添加显式 max_executions: 10 作为防御性上限，
#        与 challenged 边（max_executions: 3）的安全机制保持对称。
#        【MINOR #5 说明】loop 边使用自定义 verdict，编译为 type=normal（而非 backward），
#        这是 D1 修复的设计决策——使用自定义 verdict 规避 SDK 对 fail 边的默认
#        max_executions=3。type=normal 在拓扑上执行 backward 路由，语义上可能引起
#        误解，但当前不影响功能正确性。
#     b) 对抗迭代回路 —— 机会红队 challenged → 机会分析师
#        backward 边，显式 max_executions=3，与需求"最多 3 轮"一致
#        【D2 修复】原声明缺少显式 max_executions，SDK_SPEC 仅对 fail 边
#        提供默认 max_executions=3，challenged 为自定义 verdict 无默认值。
#        已添加显式 max_executions: 3。
#        超过 3 轮后 backward 边被掐断；机会红队 skill 应在第 3 轮仍未通过时
#        改为输出 confirmed（在报告中标注 risk_flag=true），确保流程继续下游。
#
# §3  对抗性设计（机会红队 6 维度压力测试）
#     质疑维度：
#       · 市场规模真实性 —— TAM/SAM/SOM 数据支撑、潜在市场 vs 可服务市场
#       · 技术壁垒充分性 —— 可持续性、复制门槛、稀缺资源依赖
#       · 竞争格局盲点 —— 已有玩家、大厂入场风险、替代方案
#       · 用户需求真实性 —— 伪需求排除、付费意愿、"有趣"≠"有价值"
#       · 学术-商业鸿沟 —— 学术背景转化可行性、研究到产品的距离
#       · 副业可行性 —— 时间投入（是否兼容主业）、启动门槛（启动资金/
#         技术门槛是否过高）、变现周期（多久能产生第一笔收入）、与主业
#         冲突（是否与科研主业在时间/精力上冲突）
#     confirmed → 策略建议者（通过验证，进入下游）
#     challenged → 机会分析师（回退修正，迭代 max 3 轮）
#
# §4  F4 澄清（裁决审计者建议：C2"搜集"与 8.3"不采集"矛盾）
#     v2 更新：市场情报搜集者执行实时联网搜索（WebSearch/WebFetch），
#     搜索前沿融资信息、科技动态、市场信号、AI 编排/AI 服务领域需求。
#     "搜集"在 v2 中指通过 WebSearch 进行实时联网搜索 + 综合分析框架
#     构建——包括趋势总结、融资事件梳理、竞品格局归纳、用户需求信号
#     解读，并使用 WebFetch 深入抓取关键页面。每条数据标注 URL/来源/
#     检索时间。此澄清已体现在市场情报搜集者的角色注释中。
#
# §5  物料类型约定
#     deliverable: 用户可读文件（探索任务书、情报报告、机会清单、策略建议、综合报告）
#     process: 中间反馈报告（对抗报告、校验报告）
#     综合报告者为最终交付物（AI 副业探索报告.md）
#     报告兼作获客素材，可向潜在客户展示引擎能力
#
# §6  知识文档设计（架构师产出，技能填充者生成）
#     详见知识文档设计清单（outputs/知识文档设计.json）。
#     5 篇知识文档覆盖核心分析角色：
#       · 市场情报方法论 → 市场情报搜集者
#       · 机会评估方法论 → 机会分析师
#       · 红队测试方法论 → 机会红队
#       · 策略制定指南 → 策略建议者
#       · 报告格式规范 → 综合报告者
#
# §7  verdict 设计时序
#     机会红队 verdict（唯一权威源为 edges 的 when: 表达式）：
#       · confirmed —— 机会清单经受住质疑，进入策略阶段
#       · challenged —— 存在可修复的重大缺陷，回退修正
#     需求接收者（校验）verdict（唯一权威源为 edges 的 when: 表达式）：
#       · confirmed —— 探索任务书七大要素齐全
#       · loop —— 要素缺失，回退修正（自定义 verdict，非系统 fail）
# ═══════════════════════════════════════════════════════════════

knowledge:
  - 市场情报方法论: knowledge/市场情报方法论.md
    inject_to: [市场情报搜集者]
  - 机会评估方法论: knowledge/机会评估方法论.md
    inject_to: [机会分析师]
  - 红队测试方法论: knowledge/红队测试方法论.md
    inject_to: [机会红队]
  - 策略制定指南: knowledge/策略制定指南.md
    inject_to: [策略建议者]
  - 报告格式规范: knowledge/报告格式规范.md
    inject_to: [综合报告者]

roles:
  # ═══ L1 需求理解层 ═══

  # producer 入口角色，confirm: manual
  # 接收用户背景与探索意图，生成结构化探索任务书
  # 任务书包含：用户画像（≥3 维度：背景/技能/兴趣）、关注领域、探索边界、
  # 投入意愿、副业约束（时间预算/启动资金上限/期望变现周期/风险偏好）
  需求接收者:
    type: producer
    confirm: manual
    outputs:
      - 探索任务书: 01-探索任务书.md

  # producer 自动展开的校验角色
  # 校验探索任务书：用户画像 ≥3 维度、关注领域、探索边界、副业约束完整
  # confirmed → 市场情报搜集者；loop → 回退需求接收者
  需求接收者（校验）:
    type: standard
    confirm: auto
    inputs:
      - 探索任务书: 01-探索任务书.md
    outputs:
      - 需求校验报告: outputs/需求接收者-validation.json, type=process

  # ═══ L2 情报搜集层 ═══

  # 搜集 AI 领域多维度市场信息，产出结构化市场情报报告
  # 【F4 澄清 §4】v2：通过 WebSearch/WebFetch 执行实时联网搜索，
  #   搜索前沿融资、科技动态、市场信号、AI 编排/AI 服务市场需求
  # 情报维度：技术趋势、融资数据、竞品格局、用户需求信号、政策导向、
  #   AI 服务市场需求（≥3 维度）
  市场情报搜集者:
    type: standard
    confirm: auto
    inputs:
      - 探索任务书: 01-探索任务书.md
    outputs:
      - 市场情报报告: 02-市场情报报告.md

  # ═══ L3 机会分析层 ═══

  # 分析市场情报，识别潜在商业机会（≥3 个），逐一评估
  # 含引擎能力变现方向识别（≥40% 与引擎能力/AI 编排/多角色协作相关）
  # 每个机会含 6 项必填要素：描述、目标用户、市场规模、技术壁垒、竞争分析、可行性评分
  # confirmed → 机会红队；回退来源：机会红队 challenged（携带对抗报告）
  机会分析师:
    type: standard
    confirm: auto
    inputs:
      - 探索任务书: 01-探索任务书.md
      - 市场情报报告: 02-市场情报报告.md
      # [可选输入] 机会红队 challenged 回退时存在
      - 对抗报告: outputs/机会红队-对抗报告.json, type=process
    outputs:
      - 机会清单: 03-机会清单.md

  # 对抗角色（§3），对机会清单进行 6 维度压力测试
  # 每个机会质疑 ≥2 个风险维度
  # confirmed → 策略建议者（通过验证，进入下游）
  # challenged → 机会分析师（回退修正，迭代 max 3 轮，显式 max_executions: 3）
  机会红队:
    type: standard
    confirm: auto
    inputs:
      - 机会清单: 03-机会清单.md
      - 探索任务书: 01-探索任务书.md
    outputs:
      - 对抗报告: outputs/机会红队-对抗报告.json, type=process

  # ═══ L4 策略与报告层 ═══

  # 基于通过验证的机会，制定可执行行动策略 + 副业启动路线图
  # 每个存活机会 ≥3 条可执行行动项
  # 策略分层：近期行动（1-3 月）、中期路径（3-12 月）、资源需求
  # 含副业启动路线图（冷启动策略/定价模型/从项目到产品）+ 引擎能力展示获客策略
  策略建议者:
    type: standard
    confirm: auto
    inputs:
      - 机会清单: 03-机会清单.md
      - 对抗报告: outputs/机会红队-对抗报告.json, type=process
      - 探索任务书: 01-探索任务书.md
    outputs:
      - 策略建议: 04-策略建议.md

  # 整合全链路产出，撰写最终 AI 副业探索报告（最终交付物）
  # 报告五章结构：执行摘要、详细分析、行动路线图、风险提示、副业启动建议
  # 报告兼作获客素材，可向潜在客户展示引擎能力
  综合报告者:
    type: standard
    confirm: auto
    inputs:
      - 探索任务书: 01-探索任务书.md
      - 市场情报报告: 02-市场情报报告.md
      - 机会清单: 03-机会清单.md
      - 对抗报告: outputs/机会红队-对抗报告.json, type=process
      - 策略建议: 04-策略建议.md
    outputs:
      - 综合报告: AI副业探索报告.md

edges:
  # ═══════════════════════════════════════════════════════════════
  # L1 需求理解层
  # ═══════════════════════════════════════════════════════════════

  # producer 自动展开：需求接收者 → 需求接收者（校验）
  - 需求接收者 → 需求接收者（校验）

  # ── 需求校验回路（局部回退，max_executions: 10 防御性上限）──
  # 【D1 修复】使用自定义 verdict 'loop' 替代系统保留词 'fail'，
  # 避免编译器对 fail 边施加默认 max_executions=3
  # 【R5 修复】添加显式 max_executions: 10，消除极端条件下永久挂死风险
  - 需求接收者（校验）→ 市场情报搜集者 when: result.verdict == "confirmed"
  - 需求接收者（校验）→ 需求接收者 when: result.verdict == "loop" max_executions: 10

  # ═══════════════════════════════════════════════════════════════
  # L2→L3 情报搜集 → 机会分析
  # ═══════════════════════════════════════════════════════════════

  - 市场情报搜集者 → 机会分析师

  # ═══════════════════════════════════════════════════════════════
  # L3 机会分析 → 对抗验证
  # ═══════════════════════════════════════════════════════════════

  - 机会分析师 → 机会红队

  # ── 机会红队条件路由（§3 对抗性设计）──
  # confirmed → 策略建议者（通过验证，进入下游）
  - 机会红队 → 策略建议者 when: result.verdict == "confirmed"
  # challenged → 机会分析师（backward 边，显式 max_executions: 3）
  # 【D2 修复】添加显式 max_executions: 3，确保引擎在 3 次后掐断该边，
  # 配合 verdict_enum 动态过滤强制角色输出 confirmed，与需求「最多 3 轮」一致
  # 超过 3 轮后，机会红队 skill 应改为输出 confirmed（标注 risk_flag）
  - 机会红队 → 机会分析师 when: result.verdict == "challenged" max_executions: 3

  # ═══════════════════════════════════════════════════════════════
  # L4 策略建议 → 综合报告
  # ═══════════════════════════════════════════════════════════════

  - 策略建议者 → 综合报告者

  # ═══════════════════════════════════════════════════════════════
  # 终态出口
  # ═══════════════════════════════════════════════════════════════

  - 综合报告者 → 完成
