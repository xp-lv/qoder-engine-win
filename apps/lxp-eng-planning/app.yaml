app_name: lxp-eng-planning

# --------------------------------------------------------------------
# knowledge：公共知识文档（选择性注入到指定角色）
# --------------------------------------------------------------------
knowledge:
  - 前端拖拽交互最佳实践: knowledge/前端拖拽交互最佳实践.md
    inject_to: [前端文档管理者, 交互逻辑设计师, 美学布局设计师, 前端实现者]

  - 树形数据结构存储优化: knowledge/树形数据结构存储优化.md
    inject_to: [后端文档管理者, 后端架构设计师, 数据模型设计师, API契约设计师, 后端实现者]

  - 文档驱动开发方法论: knowledge/文档驱动开发方法论.md
    inject_to: [前端文档管理者, 后端文档管理者, 部署文档管理者]

  - 精力管理领域知识: knowledge/精力管理领域知识.md
    inject_to: [需求分流者, 前端文档管理者, 后端文档管理者, 交互逻辑设计师, 前端实现者]

  - 校验标准手册: knowledge/校验标准手册.md
    inject_to: [交叉审核者, 合并校验者, 综合裁决者]

  - 全栈启动验证最佳实践: knowledge/全栈启动验证最佳实践.md
    inject_to: [后端启动验证者, 全栈联调验证者, 合并校验者, 后端实现者, 前端实现者]

# --------------------------------------------------------------------
# roles：角色定义（18 角色）
# 迭代入口 / 需求确认 / 需求分流 / 前后端文档 / 交叉审核 /
# 设计组(5并行) / 前后端实现 / 前端部署 / 运行时验证 /
# 合并校验 / 部署 / 终审
# --------------------------------------------------------------------
roles:

  # === 迭代入口 ===

  迭代守门人:
    type: standard
    confirm: manual

  # === 需求确认阶段 ===

  需求接收者:
    type: producer
    confirm: manual
    outputs:
      - 需求文档: 00-需求描述.md

  需求审计者:
    type: standard
    confirm: auto
    inputs:
      - 需求文档: 00-需求描述.md
    outputs:
      - 需求审计报告: outputs/需求审计报告.json, type=process

  # === 需求分流阶段 ===

  需求分流者:
    type: standard
    confirm: auto
    inputs:
      - 需求文档: 00-需求描述.md
      - 需求审计报告: outputs/需求审计报告.json, type=process
    outputs:
      - 前端需求摘要: outputs/前端需求摘要.md
      - 后端需求摘要: outputs/后端需求摘要.md

  # === 前后端文档阶段 ===

  前端文档管理者:
    type: standard
    confirm: auto
    inputs:
      - 前端需求摘要: outputs/前端需求摘要.md
      - 交叉审核报告: outputs/交叉审核报告.json, type=process
    outputs:
      - 前端需求规格文档: outputs/前端需求规格文档.md
      - 前端交互规范: outputs/前端交互规范.md

  后端文档管理者:
    type: standard
    confirm: auto
    inputs:
      - 后端需求摘要: outputs/后端需求摘要.md
      - 交叉审核报告: outputs/交叉审核报告.json, type=process
    outputs:
      - 后端需求规格文档: outputs/后端需求规格文档.md
      - 后端业务逻辑文档: outputs/后端业务逻辑文档.md

  # === 交叉审核阶段（文档层对抗）===

  交叉审核者:
    type: standard
    confirm: auto
    inputs:
      - 前端需求规格文档: outputs/前端需求规格文档.md
      - 前端交互规范: outputs/前端交互规范.md
      - 后端需求规格文档: outputs/后端需求规格文档.md
      - 后端业务逻辑文档: outputs/后端业务逻辑文档.md
    outputs:
      - 交叉审核报告: outputs/交叉审核报告.json, type=process

  # === 前端设计组 ===

  交互逻辑设计师:
    type: standard
    confirm: auto
    inputs:
      - 前端需求规格文档: outputs/前端需求规格文档.md
      - 前端交互规范: outputs/前端交互规范.md
      - 交叉审核报告: outputs/交叉审核报告.json, type=process
    outputs:
      - 交互逻辑设计文档: outputs/交互逻辑设计文档.md

  美学布局设计师:
    type: standard
    confirm: auto
    inputs:
      - 前端需求规格文档: outputs/前端需求规格文档.md
      - 前端交互规范: outputs/前端交互规范.md
      - 交叉审核报告: outputs/交叉审核报告.json, type=process
    outputs:
      - 美学布局设计文档: outputs/美学布局设计文档.md

  接口翻译师:
    type: standard
    confirm: auto
    inputs:
      - 前端需求规格文档: outputs/前端需求规格文档.md
      - 后端需求规格文档: outputs/后端需求规格文档.md
      - 后端业务逻辑文档: outputs/后端业务逻辑文档.md
      - 交叉审核报告: outputs/交叉审核报告.json, type=process
    outputs:
      - 接口翻译文档: outputs/接口翻译文档.md

  # === 后端设计组 ===

  后端架构设计师:
    type: standard
    confirm: auto
    inputs:
      - 后端需求规格文档: outputs/后端需求规格文档.md
      - 后端业务逻辑文档: outputs/后端业务逻辑文档.md
      - 交叉审核报告: outputs/交叉审核报告.json, type=process
    outputs:
      - 后端架构设计文档: outputs/后端架构设计文档.md

  数据模型设计师:
    type: standard
    confirm: auto
    inputs:
      - 后端需求规格文档: outputs/后端需求规格文档.md
      - 后端业务逻辑文档: outputs/后端业务逻辑文档.md
      - 交叉审核报告: outputs/交叉审核报告.json, type=process
    outputs:
      - 数据库设计文档: outputs/数据库设计文档.md

  API契约设计师:
    type: standard
    confirm: auto
    inputs:
      - 后端需求规格文档: outputs/后端需求规格文档.md
      - 后端业务逻辑文档: outputs/后端业务逻辑文档.md
      - 接口翻译文档: outputs/接口翻译文档.md
      - 交叉审核报告: outputs/交叉审核报告.json, type=process
    outputs:
      - API详细设计文档: outputs/API详细设计文档.md

  # === 前后端实现阶段 ===

  前端实现者:
    type: producer
    confirm: auto
    inputs:
      - 交互逻辑设计文档: outputs/交互逻辑设计文档.md
      - 美学布局设计文档: outputs/美学布局设计文档.md
      - 接口翻译文档: outputs/接口翻译文档.md
      - 合并校验报告: outputs/合并校验报告.json, type=process
    outputs:
      - 前端代码: outputs/src/frontend/

  后端实现者:
    type: producer
    confirm: auto
    inputs:
      - 后端架构设计文档: outputs/后端架构设计文档.md
      - 数据库设计文档: outputs/数据库设计文档.md
      - API详细设计文档: outputs/API详细设计文档.md
      - 合并校验报告: outputs/合并校验报告.json, type=process
    outputs:
      - 后端代码: outputs/src/backend/
      - 数据库Schema: outputs/prisma/schema.prisma
      - 部署配置: outputs/docker-compose.yml

  # === 前端UI状态预览阶段（纯前端+mock数据，manual确认UI设计）===

  预览部署者:
    type: standard
    confirm: manual
    inputs:
      - 前端代码: outputs/src/frontend/
    outputs:
      - 预览部署报告: outputs/预览部署报告.json, type=process
      - 组件状态目录页: outputs/src/frontend/src/_preview/StatesShowcase.tsx

  # === 运行时验证阶段 ===

  后端启动验证者:
    type: standard
    confirm: auto
    inputs:
      - 后端代码: outputs/src/backend/
      - 数据库Schema: outputs/prisma/schema.prisma
      - 部署配置: outputs/docker-compose.yml
    outputs:
      - 后端启动验证报告: outputs/后端启动验证报告.json, type=process

  全栈联调验证者:
    type: standard
    confirm: manual
    inputs:
      - 前端代码: outputs/src/frontend/
      - 后端代码: outputs/src/backend/
      - 数据库Schema: outputs/prisma/schema.prisma
      - 部署配置: outputs/docker-compose.yml
      - 接口翻译文档: outputs/接口翻译文档.md
    outputs:
      - 联调验证报告: outputs/联调验证报告.json, type=process

  # === 合并校验阶段（代码层对抗）===

  合并校验者:
    type: standard
    confirm: auto
    inputs:
      - 前端代码: outputs/src/frontend/
      - 后端代码: outputs/src/backend/
      - 数据库Schema: outputs/prisma/schema.prisma
      - 部署配置: outputs/docker-compose.yml
      - 前端需求规格文档: outputs/前端需求规格文档.md
      - 后端需求规格文档: outputs/后端需求规格文档.md
      - API详细设计文档: outputs/API详细设计文档.md
      - 接口翻译文档: outputs/接口翻译文档.md
      - 联调验证报告: outputs/联调验证报告.json, type=process
    outputs:
      - 合并校验报告: outputs/合并校验报告.json, type=process

  # === 部署文档阶段 ===

  部署文档管理者:
    type: standard
    confirm: auto
    inputs:
      - 前端代码: outputs/src/frontend/
      - 后端代码: outputs/src/backend/
      - 部署配置: outputs/docker-compose.yml
      - App架构文件: app.yaml
    outputs:
      - 部署指南: outputs/部署指南.md
      - 运维手册: outputs/运维手册.md
      - 变更日志: outputs/CHANGELOG.md

  # === 终审阶段（全局对抗）===

  综合裁决者:
    type: standard
    confirm: manual
    inputs:
      - 前端需求规格文档: outputs/前端需求规格文档.md
      - 后端需求规格文档: outputs/后端需求规格文档.md
      - 交叉审核报告: outputs/交叉审核报告.json, type=process
      - 合并校验报告: outputs/合并校验报告.json, type=process
      - 部署指南: outputs/部署指南.md
      - 运维手册: outputs/运维手册.md
      - 变更日志: outputs/CHANGELOG.md
    outputs:
      - 最终裁决书: outputs/最终裁决书.md
      - 构建报告: outputs/构建报告.md

# --------------------------------------------------------------------
# edges：路由编排（唯一权威源）
# 18 角色 + 3 producer校验者 = 21 节点
# 4 manual（迭代守门人/需求接收者/全栈联调验证者/综合裁决者）
# 无 max_executions（由主AGENT上下文感知兜底死循环）
# --------------------------------------------------------------------
edges:

  # ===== 迭代入口 =====

  - 迭代守门人 → 需求接收者 when: result.verdict == "fresh_start"
  - 迭代守门人 → 全栈联调验证者 when: result.verdict == "incremental"
  - 迭代守门人 → 完成 when: result.verdict == "done"

  # ===== producer 自动展开 =====

  - 需求接收者 → 需求接收者（校验）
  - 前端实现者 → 前端实现者（校验）
  - 后端实现者 → 后端实现者（校验）

  # ===== 主链 confirmed =====

  # Phase 1: 需求确认
  - 需求接收者（校验） → 需求审计者
  - 需求审计者 → 需求分流者 when: result.verdict == "confirmed"

  # Phase 2: 需求分流 → 前后端文档（并行扇出）
  - 需求分流者 → [前端文档管理者, 后端文档管理者]

  # Phase 3: 前后端文档 → 交叉审核（同步汇入）
  - [前端文档管理者, 后端文档管理者] → 交叉审核者

  # Phase 4: 交叉审核通过 → 5角色并行扇出
  - 交叉审核者 → [交互逻辑设计师, 美学布局设计师, 接口翻译师, 后端架构设计师, 数据模型设计师] when: result.verdict == "confirmed"

  # Phase 4b: 接口翻译师 → API契约设计师（显式数据依赖）
  - 接口翻译师 → API契约设计师

  # Phase 5: 前端设计组 → 前端实现（同步汇入）
  - [交互逻辑设计师, 美学布局设计师, 接口翻译师] → 前端实现者

  # Phase 6: 后端设计组 → 后端实现（同步汇入）
  - [后端架构设计师, 数据模型设计师, API契约设计师] → 后端实现者

  # Phase 5.5: 前端校验 → UI状态预览（纯前端+mock数据，展示所有组件状态）
  - 前端实现者（校验） → 预览部署者

  # Phase 7a: 后端校验 → 后端启动验证
  - 后端实现者（校验） → 后端启动验证者 when: result.verdict == "confirmed"

  # Phase 7b: UI状态预览 + 后端启动 → 全栈联调（独立OR边）
  - 预览部署者 → 全栈联调验证者 when: result.verdict == "confirmed"
  - 后端启动验证者 → 全栈联调验证者 when: result.verdict == "confirmed"

  # Phase 7c: 联调通过 → 合并校验
  - 全栈联调验证者 → 合并校验者 when: result.verdict == "confirmed"

  # Phase 8: 合并校验 → 部署文档
  - 合并校验者 → 部署文档管理者 when: result.verdict == "confirmed"

  # Phase 9: 部署文档 → 终审
  - 部署文档管理者 → 综合裁决者

  # Phase 10: 终审 → 迭代守门人（闭环）
  - 综合裁决者 → 迭代守门人 when: result.verdict == "confirmed"

  # ===== producer 自校验 loop =====

  - 需求接收者（校验） → 需求接收者 when: result.verdict == "loop"
  - 前端实现者（校验） → 前端实现者 when: result.verdict == "loop"
  - 后端实现者（校验） → 后端实现者 when: result.verdict == "loop"

  # ===== 对抗回退边（无 max_executions）=====

  # 需求层对抗回退
  - 需求审计者 → 需求接收者 when: result.verdict == "challenged"

  # 交叉审核回退
  - 交叉审核者 → 前端文档管理者 when: result.verdict == "FRONTEND_DOC_DEFECT"
  - 交叉审核者 → 后端文档管理者 when: result.verdict == "BACKEND_DOC_DEFECT"
  - 交叉审核者 → [前端文档管理者, 后端文档管理者] when: result.verdict == "BOTH_DOC_DEFECT"

  # 后端启动验证回退
  - 后端启动验证者 → 后端实现者 when: result.verdict == "BACKEND_BLOCKING"

  # 全栈联调验证回退（用户在完整系统上提意见）
  - 全栈联调验证者 → 前端实现者 when: result.verdict == "FRONTEND_BLOCKING"
  - 全栈联调验证者 → 后端实现者 when: result.verdict == "BACKEND_BLOCKING"
  - 全栈联调验证者 → [交互逻辑设计师, 美学布局设计师] when: result.verdict == "design_fix"

  # 合并校验回退
  - 合并校验者 → 前端实现者 when: result.verdict == "FRONTEND_BLOCKING"
  - 合并校验者 → 后端实现者 when: result.verdict == "BACKEND_BLOCKING"

  # 终审定向回退
  - 综合裁决者 → 需求分流者 when: result.verdict == "challenged"
  - 综合裁决者 → [前端文档管理者, 后端文档管理者] when: result.verdict == "doc_challenged"
  - 综合裁决者 → 部署文档管理者 when: result.verdict == "deploy_doc_defect"
